version: '3.8'
services:
  vprodb:
    build: 
      context: ./Docker-files/db
      dockerfile: Dockerfile
    image: jagacodes/vprofiledb
    container_name: vprodb
    ports:
      - "3306:3306"
    volumes:
      - vprodbdata:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=vprodbpass
  
  vprocache01:
    image: memcached
    container_name: vprocache01
    ports:
      - "11211:11211"

  vpromq01:
    image: rabbitmq
    container_name: vpromq01
    ports:
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

  vproapp:
    build: 
      context: ./Docker-files/app
      dockerfile: Dockerfile
    image: jagacodes/vprofileapp
    container_name: vproapp
    ports:
      - "8080:8080"
    volumes:
      - vproappdata:/usr/local/tomcat/webapps

  vproweb:
    build: 
      context: ./Docker-files/web
      dockerfile: Dockerfile
    image: jagacodes/vprofileweb
    container_name: vproaweb
    ports:
      - "80:80"

volumes:
  vprodbdata: {} 
  vproappdata: {} 
    



  
